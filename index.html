// ====================================================
// WEBSITE LOGIC — YOU USUALLY DO NOT EDIT BELOW

const appKey = new URLSearchParams(window.location.search).get("app");
const app = apps[appKey];

const titleElement = document.getElementById("title");
const iconElement = document.getElementById("appIcon");
const subtitleElement = document.getElementById("subtitle");
const descriptionElement = document.getElementById("description");
const detailsElement = document.getElementById("appDetails");
const messageElement = document.getElementById("message");
const installButton = document.getElementById("installButton");
const errorElement = document.getElementById("error");

if (!app) {
    document.title = "App Not Found";
    titleElement.textContent = "App not found";
    messageElement.style.display = "none";
    installButton.style.display = "none";
    errorElement.style.display = "block";
    errorElement.textContent =
        "The app name in the URL does not match an app inside this installer.";
} else {
    const installUrl =
        "itms-services://?action=download-manifest&url=" +
        encodeURIComponent(app.plist);

    document.title = "Install " + app.name;
    titleElement.textContent = app.name + " installation";
    installButton.href = installUrl;

    if (app.icon) {
        iconElement.src = app.icon;
        iconElement.alt = app.name + " icon";
        iconElement.style.display = "block";
    }

    if (app.subtitle) {
        subtitleElement.textContent = app.subtitle;
        subtitleElement.style.display = "block";
    }

    if (app.description) {
        descriptionElement.textContent = app.description;
        descriptionElement.style.display = "block";
    }

    const details = [];

    if (app.version) {
        details.push("Version " + app.version);
    }

    if (app.developer) {
        details.push(app.developer);
    }

    if (details.length > 0) {
        detailsElement.textContent = details.join(" • ");
        detailsElement.style.display = "block";
    }

    window.addEventListener("load", function () {
        window.location.href = installUrl;
    });
